name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: apps/mobile

jobs:
  # ── Job 1: Format · Analyze · Unit+Widget tests ─────────────────────────────
  test:
    name: Format / Analyze / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Unit & widget tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/mobile/coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # ── Job 2: Web build check ───────────────────────────────────────────────────
  build-web:
    name: Build / Web
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: flutter build web --release

  # ── Job 3: Android build check ──────────────────────────────────────────────
  build-android:
    name: Build / Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Write google-services.json
        run: |
          python3 << 'PYEOF'
          import os, base64, json, sys
          secret = os.environ.get('GOOGLE_SERVICES_JSON_B64', '').strip()
          target = 'android/app/google-services.json'
          placeholder = '{"project_info":{"project_number":"000000000000","project_id":"saveameal-ci","storage_bucket":"saveameal-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.example.mobile"}},"oauth_client":[],"api_key":[{"current_key":"ci-placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}'
          content = None
          if secret:
              try:
                  decoded = base64.b64decode(secret).decode('utf-8')
                  json.loads(decoded)
                  content = decoded
              except Exception:
                  pass
              if content is None:
                  try:
                      json.loads(secret)
                      content = secret
                  except Exception:
                      print('WARNING: GOOGLE_SERVICES_JSON is neither valid base64-JSON nor plain JSON; using CI placeholder', file=sys.stderr)
          with open(target, 'w') as f:
              f.write(content if content is not None else placeholder)
          PYEOF
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Build Android APK (debug)
        run: flutter build apk --debug
