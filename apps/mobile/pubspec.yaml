name: saveameal
description: SaveAMeal — food rescue marketplace connecting donors, volunteers, and beneficiaries.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State management ──────────────────────────────────────────────────────────
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^14.0.0

  # ── Offline / local storage ───────────────────────────────────────────────────
  hive_flutter: ^1.1.0

  # ── Images ────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.0

  # ── Secrets / secure storage ──────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.0

  # ── Models ────────────────────────────────────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── Firebase ──────────────────────────────────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_crashlytics: ^4.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # ── Maps & Location ───────────────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.0

  # ── QR Code / Scanner ─────────────────────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # ── Media / IDs ───────────────────────────────────────────────────────────────
  image_picker: ^1.1.0
  uuid: ^4.5.0

  # ── Networking ────────────────────────────────────────────────────────────────
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # ── Linting ───────────────────────────────────────────────────────────────────
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.0

  # ── App icon generation ───────────────────────────────────────────────────────
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: false
  windows:
    generate: false
